<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="assests/css/style.css">
</head>
<body>
    <div class="calculator">
        <div class="disp-wrap">
            <div class="disp-expr" id="expr"></div>
            <input type="text" class="disp-input" id="display" value="0" readonly>
        </div>
        <div class="buttons">
    <button class="btn-clear" onclick="clearAll()">AC</button>
    <button class="btn-purple" onclick="appendRaw('(')">(</button>
    <button class="btn-purple" onclick="appendRaw(')')">)</button>
    <button class="btn-op" onclick="appendOp('/')">÷</button>

    <button onclick="appendNum('7')">7</button>
    <button onclick="appendNum('8')">8</button>
    <button onclick="appendNum('9')">9</button>
    <button class="btn-op" onclick="appendOp('*')">×</button>

    <button onclick="appendNum('4')">4</button>
    <button onclick="appendNum('5')">5</button>
    <button onclick="appendNum('6')">6</button>
    <button class="btn-op" onclick="appendOp('-')">−</button>

    <button onclick="appendNum('1')">1</button>
    <button onclick="appendNum('2')">2</button>
    <button onclick="appendNum('3')">3</button>
    <button class="btn-op" onclick="appendOp('+')">+</button>

    <button class="btn-purple" onclick="squareCurrent()">x²</button>
    <button onclick="appendNum('0')">0</button>
    <button onclick="appendDot()">.</button>
    <button class="btn-back" onclick="backspace()">⌫</button>

    <button class="btn-purple span2" onclick="toggleSign()">+/−</button>
    <button class="btn-purple span2" onclick="appendOp('%')">%</button>

    <button class="btn-eq span4" onclick="calculate()">=</button>
</div>
    </div>
    <script src="assests/js/main.js"></script>
</body>
</html>
